name: Build & Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-2.amazonaws.com

jobs:
  # ── Job 1: Build & push Docker images to ECR ─────────────────────────────────
  build:
    name: Build ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    environment: AWS
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: gateway,               context: backend/apps/gateway }
          - { name: auth-service,          context: backend/services/auth-service }
          - { name: user-service,          context: backend/services/user-service }
          - { name: product-service,       context: backend/services/product-service }
          - { name: cart-service,          context: backend/services/cart-service }
          - { name: order-service,         context: backend/services/order-service }
          - { name: inventory-service,     context: backend/services/inventory-service }
          - { name: payment-service,       context: backend/services/payment-service }
          - { name: notification-service,  context: backend/services/notification-service }
          - { name: search-service,        context: backend/services/search-service }

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine Dockerfile
        id: dockerfile
        run: |
          if [ -f "${{ matrix.service.context }}/Dockerfile" ]; then
            echo "path=${{ matrix.service.context }}/Dockerfile" >> $GITHUB_OUTPUT
          else
            echo "path=backend/Dockerfile.service" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ steps.dockerfile.outputs.path }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ matrix.service.name }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ matrix.service.name }}:latest
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

  # ── Job 2: Update GitOps repo → ArgoCD auto-sync ─────────────────────────────
  deploy:
    name: Update GitOps
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/toidibangiay-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update image tags in kustomization files
        run: |
          SERVICES=(gateway auth-service user-service product-service cart-service order-service inventory-service payment-service notification-service search-service)
          for svc in "${SERVICES[@]}"; do
            FILE="gitops/k8s/apps/$svc/kustomization.yaml"
            if [ -f "$FILE" ]; then
              sed -i "s|newTag: .*|newTag: ${{ github.sha }}|g" "$FILE"
              sed -i "s|newName: .*$svc|newName: ${{ env.ECR_REGISTRY }}/$svc|g" "$FILE"
            fi
          done

      - name: Commit and push
        working-directory: gitops
        run: |
          git config user.email "ci@toidibangiay.vn"
          git config user.name "GitHub Actions"
          git add .
          git diff --staged --quiet || git commit -m "ci: deploy ${{ github.sha }}"
          git push
